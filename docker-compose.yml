# ──────────────────────────────────────────────────────────────
# Capsule — Local Development Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgres redis  # Start only dependencies
#   docker compose logs -f backend    # Follow backend logs
#   docker compose down               # Stop all services
# ──────────────────────────────────────────────────────────────

name: capsule

services:
  # ────────────────────────────────────────────
  # Reverse Proxy
  # ────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: capsule-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
      - "8090:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - capsule-net

  # ────────────────────────────────────────────
  # Backend API Server
  # ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: capsule-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CAPSULE_ENV=development
      - CAPSULE_PORT=8080
      - CAPSULE_LOG_LEVEL=debug
      - DATABASE_URL=postgresql://capsule:capsule_dev@postgres:5432/capsule?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - CAPSULE_SECRET_KEY=dev-secret-key-do-not-use-in-production
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.services.backend.loadbalancer.server.port=8080
    networks:
      - capsule-net

  # ────────────────────────────────────────────
  # Frontend Dashboard
  # ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: capsule-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    networks:
      - capsule-net

  # ────────────────────────────────────────────
  # PostgreSQL Database
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: capsule-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=capsule
      - POSTGRES_PASSWORD=capsule_dev
      - POSTGRES_DB=capsule
    volumes:
      - capsule-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capsule"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - capsule-net

  # ────────────────────────────────────────────
  # Redis Cache
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capsule-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - capsule-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - capsule-net

# ────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────
volumes:
  capsule-postgres-data:
    driver: local
  capsule-redis-data:
    driver: local

# ────────────────────────────────────────────
# Networks
# ────────────────────────────────────────────
networks:
  capsule-net:
    driver: bridge
