# ──────────────────────────────────────────────────────────────
# Capsule — Production Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# ──────────────────────────────────────────────────────────────

name: capsule-prod

services:
  # ────────────────────────────────────────────
  # Reverse Proxy (TLS Termination)
  # ────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: capsule-traefik
    restart: always
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=WARN
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - capsule-letsencrypt:/letsencrypt
      - capsule-traefik-logs:/var/log/traefik
    networks:
      - capsule-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ────────────────────────────────────────────
  # Backend API Server
  # ────────────────────────────────────────────
  backend:
    image: 348973061281.dkr.ecr.us-east-1.amazonaws.com/capsule/server:latest
    container_name: capsule-backend
    restart: always
    expose:
      - "8080"
    environment:
      - CAPSULE_ENV=production
      - CAPSULE_PORT=8080
      - CAPSULE_LOG_LEVEL=${CAPSULE_LOG_LEVEL:-info}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CAPSULE_SECRET_KEY=${CAPSULE_SECRET_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET:-capsule-artifacts-348973061281}
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`api.tumi-ai.com`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8080
      - traefik.http.routers.backend-ws.rule=Host(`api.tumi-ai.com`) && PathPrefix(`/ws`)
      - traefik.http.routers.backend-ws.entrypoints=websecure
      - traefik.http.routers.backend-ws.tls.certresolver=letsencrypt
      - traefik.http.services.backend-ws.loadbalancer.server.port=8080
    networks:
      - capsule-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ────────────────────────────────────────────
  # Frontend Dashboard
  # ────────────────────────────────────────────
  frontend:
    image: 348973061281.dkr.ecr.us-east-1.amazonaws.com/capsule/frontend:latest
    container_name: capsule-frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tumi-ai.com
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`app.tumi-ai.com`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - capsule-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ────────────────────────────────────────────
  # Redis Cache
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capsule-redis
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - capsule-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - capsule-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

# ────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────
volumes:
  capsule-redis-data:
    driver: local
  capsule-letsencrypt:
    driver: local
  capsule-traefik-logs:
    driver: local

# ────────────────────────────────────────────
# Networks
# ────────────────────────────────────────────
networks:
  capsule-net:
    driver: bridge
