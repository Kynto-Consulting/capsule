name: capsule-prod

services:
  # ── Backend API Server ─────────────────────────────────────
  backend:
    image: capsule-backend:latest
    container_name: capsule-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - CAPSULE_ENV=production
      - CAPSULE_PORT=8080
      - CAPSULE_LOG_LEVEL=${CAPSULE_LOG_LEVEL:-info}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CAPSULE_SECRET_KEY=${CAPSULE_SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://app.tumi-ai.com}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET:-capsule-artifacts-348973061281}
      - AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID:-348973061281}
      - CAPSULE_PUBLIC_HOST=${CAPSULE_PUBLIC_HOST:-api.tumi-ai.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - capsule-build-cache:/tmp/capsule-builds
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - capsule-net

  # ── Frontend Dashboard ─────────────────────────────────────
  frontend:
    image: 348973061281.dkr.ecr.us-east-1.amazonaws.com/capsule/frontend:latest
    container_name: capsule-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tumi-ai.com
      - NEXT_PUBLIC_WS_URL=wss://api.tumi-ai.com
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - BACKEND_INTERNAL_URL=http://capsule-backend:8080
    depends_on:
      - backend
    networks:
      - capsule-net

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capsule-redis
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - capsule-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - capsule-net

volumes:
  capsule-redis-data:
    driver: local
  capsule-build-cache:
    driver: local

networks:
  capsule-net:
    driver: bridge
